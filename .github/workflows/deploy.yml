name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute remote ssh commands
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 92.42.96.175
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # ЭТИ ДВЕ СТРОКИ РЕШАЮТ 90% ПРОБЛЕМ:
          fingerprint: ${{ secrets.SSH_FINGERPRINT }}
          proxy_timeout: 30s
          script: |
            cd ~/XRay-bot
            git pull origin main
            # Убиваем старые процессы Python аккуратно
            pkill -f "src/app.py" || true
            sleep 2
            # Запускаем бота с ограничением по памяти, если нужно, 
            # и отправляем в фон через nohup
            nohup python3 src/app.py > bot.log 2>&1 &
            sleep 5
            # Проверяем, выжил ли процесс
            pgrep -f "src/app.py" && echo "✅ Бот успешно запущен" || (echo "❌ Бот упал при старте" && exit 1)
